name: Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: Running `python 11_verification_validation_agent.py` raises ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) you ran.
      placeholder: |
        1. cd 30agents
        2. python run_all.py
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output / traceback
      render: shell
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11.5"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / Ubuntu 22.04 / macOS 14"
    validations:
      required: true
  - type: dropdown
    id: llm-mode
    attributes:
      label: LLM mode
      options:
        - Offline MockLLM (default)
        - OpenAI (live)
        - Anthropic (live)
    validations:
      required: true
